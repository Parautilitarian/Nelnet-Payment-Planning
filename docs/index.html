<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pay Now vs Pay Later</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      label {
        display: block;
        margin-top: 1rem;
        font-weight: 600;
      }
      input,
      textarea {
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.25rem;
        box-sizing: border-box;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.6rem 1.2rem;
        cursor: pointer;
      }
      pre {
        background: #f4f4f4;
        padding: 1rem;
        overflow: auto;
      }
      .hint {
        color: #555;
        font-size: 0.9rem;
        font-weight: 400;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 0.5rem;
        text-align: left;
      }
      .error {
        color: crimson;
      }
      .installment-fieldset {
        margin-top: 1rem;
        padding: 0;
        border: none;
      }
      .installment-fieldset legend {
        font-weight: 600;
        padding: 0;
      }
      .installment-fieldset .hint {
        margin: 0.25rem 0 0;
      }
      .installment-dates label {
        display: block;
        margin-top: 0.75rem;
        font-weight: 600;
      }
      .installment-dates label:first-child {
        margin-top: 0.25rem;
      }
    </style>
  </head>
  <body>
    <h1>Pay Now vs Pay Later</h1>
    <p>Compare paying in full today vs a Nelnet-style installment plan.</p>

    <form id="compare-form">
      <label>
        Principal ($)
        <input
          type="text"
          name="principal"
          value="34,940"
          inputmode="decimal"
          required
        />
      </label>

      <label>
        Scholarship (%)
        <span class="hint">Percentage of principal deducted before calculations</span>
        <input
          type="number"
          name="scholarship_pct"
          value="0"
          min="0"
          max="100"
          step="0.01"
          required
        />
      </label>

      <label>
        Pay-now date
        <input type="date" name="pay_now_date" value="2026-08-01" required />
      </label>

      <label>
        Number of installments
        <input
          type="number"
          name="installment_count"
          value="4"
          min="1"
          max="36"
          step="1"
          required
        />
      </label>

      <fieldset class="installment-fieldset">
        <legend>Installment dates</legend>
        <p class="hint">First defaults to pay-now date; others are monthly</p>
        <div id="installment-dates" class="installment-dates"></div>
      </fieldset>

      <label>
        Discount rate (%)
        <span class="hint">Your opportunity-cost / risk-free rate</span>
        <input
          type="number"
          name="discount_rate_pct"
          value="3.75"
          min="0"
          step="0.01"
          required
        />
      </label>

      <label>
        Plan interest rate (%)
        <span class="hint">Pay-later plan rate</span>
        <input
          type="number"
          name="annual_interest_rate_pct"
          value="0"
          min="0"
          step="0.01"
          required
        />
      </label>

      <label>
        Setup fee ($)
        <input type="number" name="setup_fee" value="40" min="0" step="0.01" />
      </label>

      <label>
        Setup fee date
        <span class="hint">Leave blank to use pay-now date</span>
        <input type="date" name="setup_fee_date" />
      </label>

      <details>
        <summary>Optional: provider schedule (amount + date pairs)</summary>
        <label>
          Amounts (one per line)
          <textarea
            name="pay_later_amounts"
            rows="4"
            placeholder="40&#10;2540&#10;2530"
          ></textarea>
        </label>
        <label>
          Provider dates (one per line)
          <textarea
            name="pay_later_dates"
            rows="4"
            placeholder="2025-06-05&#10;2025-07-05"
          ></textarea>
        </label>
      </details>

      <button type="submit">Compare</button>
    </form>

    <div id="results"></div>

    <script type="module">
      import { compareFromForm } from "./js/payment-comparison.js";

      const form = document.getElementById("compare-form");
      const results = document.getElementById("results");

      function parseCurrency(value) {
        return Number(String(value).replace(/,/g, ""));
      }

      function formatCurrency(value) {
        const num = Number(value);
        if (Number.isNaN(num)) return value;
        return num.toLocaleString("en-US", { maximumFractionDigits: 2 });
      }

      form.principal.addEventListener("blur", () => {
        const amount = parseCurrency(form.principal.value);
        if (!Number.isNaN(amount)) {
          form.principal.value = formatCurrency(amount);
        }
      });

      const installmentDatesEl = document.getElementById("installment-dates");

      function addMonths(isoDate, months) {
        const [year, month, day] = isoDate.split("-").map(Number);
        return new Date(Date.UTC(year, month - 1 + months, day))
          .toISOString()
          .slice(0, 10);
      }

      function buildInstallmentDates() {
        const count = Math.max(1, Number(form.installment_count.value) || 1);
        const startDate = form.pay_now_date.value;

        installmentDatesEl.replaceChildren();
        for (let i = 0; i < count; i++) {
          const label = document.createElement("label");
          label.textContent = `Installment ${i + 1}`;
          const input = document.createElement("input");
          input.type = "date";
          input.name = `payment_date_${i}`;
          input.value = addMonths(startDate, i);
          input.required = true;
          label.appendChild(input);
          installmentDatesEl.appendChild(label);
        }
      }

      function getPaymentDates() {
        return [...installmentDatesEl.querySelectorAll('input[type="date"]')]
          .map((input) => input.value)
          .filter(Boolean);
      }

      function syncInstallmentDates() {
        const count = Math.max(1, Number(form.installment_count.value) || 1);
        const payNowDate = form.pay_now_date.value;
        const inputs = installmentDatesEl.querySelectorAll('input[type="date"]');

        if (!inputs.length) {
          buildInstallmentDates();
          return;
        }

        if (inputs[0]) {
          inputs[0].value = payNowDate;
        }

        for (let i = 1; i < count; i++) {
          if (inputs[i]) {
            inputs[i].value = addMonths(payNowDate, i);
          }
        }
      }

      form.installment_count.addEventListener("input", buildInstallmentDates);
      form.pay_now_date.addEventListener("input", syncInstallmentDates);
      form.pay_now_date.addEventListener("change", syncInstallmentDates);
      buildInstallmentDates();

      function lines(value) {
        return value
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean);
      }

      function formatMoney(amount) {
        return amount.toLocaleString("en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
      }

      function renderResult(data) {
        const scheduleRows = data.pay_later_schedule
          .map(
            (row) =>
              `<tr><td>${row.date}</td><td>$${formatMoney(row.amount)}</td></tr>`
          )
          .join("");

        results.innerHTML = `
          <h2>Result</h2>
          <p><strong>Principal:</strong> $${formatMoney(data.principal)}</p>
          <p><strong>Scholarship (${data.scholarship_pct}%):</strong> −$${formatMoney(data.scholarship_amount)}</p>
          <p><strong>Amount compared:</strong> $${formatMoney(data.effective_principal)}</p>
          <p><strong>Better option:</strong> ${data.better_option.replace("_", " ")}</p>
          <p><strong>PV if pay now:</strong> $${formatMoney(data.pv_pay_now)}</p>
          <p><strong>PV if pay later:</strong> $${formatMoney(data.pv_pay_later)}</p>
          <p><strong>Gain if pay now:</strong> $${formatMoney(data.gain_if_pay_now)}</p>
          <p><strong>Gain if pay later:</strong> $${formatMoney(data.gain_if_pay_later)}</p>
          <h3>Pay-later schedule</h3>
          <table>
            <thead><tr><th>Date</th><th>Amount</th></tr></thead>
            <tbody>${scheduleRows}</tbody>
          </table>
          <pre>${JSON.stringify(data, null, 2)}</pre>
        `;
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const payload = {
          principal: parseCurrency(form.principal.value),
          scholarship_pct: Number(form.scholarship_pct.value),
          pay_now_date: form.pay_now_date.value,
          payment_dates: getPaymentDates(),
          discount_rate: Number(form.discount_rate_pct.value) / 100,
          annual_interest_rate:
            Number(form.annual_interest_rate_pct.value) / 100,
          setup_fee: Number(form.setup_fee.value || 0),
        };

        if (form.setup_fee_date.value) {
          payload.setup_fee_date = form.setup_fee_date.value;
        }

        const providerAmounts = lines(form.pay_later_amounts.value).map(Number);
        const providerDates = lines(form.pay_later_dates.value);
        if (providerAmounts.length || providerDates.length) {
          payload.pay_later_amounts = providerAmounts;
          payload.pay_later_dates = providerDates;
        }

        try {
          renderResult(compareFromForm(payload));
        } catch (error) {
          results.innerHTML = `<p class="error">${error.message}</p>`;
        }
      });
    </script>
  </body>
</html>
