<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pay Now vs Pay Later</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .lang-bar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .lang-bar label {
        margin: 0;
        font-weight: 600;
      }
      .lang-bar select {
        padding: 0.35rem 0.5rem;
      }
      label {
        display: block;
        margin-top: 1rem;
        font-weight: 600;
      }
      input,
      textarea {
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.25rem;
        box-sizing: border-box;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.6rem 1.2rem;
        cursor: pointer;
      }
      .section-divider {
        margin: 1.5rem 0;
        border: none;
        border-top: 1px solid #ccc;
      }
      .hint {
        color: #555;
        font-size: 0.9rem;
        font-weight: 400;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 0.5rem;
        text-align: left;
      }
      .error {
        color: crimson;
      }
      .installment-fieldset {
        margin-top: 1rem;
        padding: 0;
        border: none;
      }
      .installment-fieldset.hidden {
        display: none;
      }
      .installment-fieldset legend {
        font-weight: 600;
        padding: 0;
      }
      .installment-fieldset .hint {
        margin: 0.25rem 0 0;
      }
      .installment-row {
        margin-top: 0.75rem;
      }
      .installment-row-title {
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .installment-row-fields {
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 0.75rem;
        row-gap: 0.25rem;
      }
      .installment-field-label {
        display: block;
        margin: 0;
        font-weight: 600;
        font-size: 0.9rem;
      }
      .installment-row-fields input {
        margin-top: 0;
        width: 100%;
        min-height: 2.375rem;
      }
      @media (max-width: 520px) {
        .installment-row-fields {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="lang-bar">
      <label for="language-select" data-i18n="languageLabel">Language</label>
      <select id="language-select" aria-label="Language">
        <option value="en">English</option>
        <option value="zh-Hans">简体中文</option>
        <option value="zh-Hant">繁體中文</option>
        <option value="es">Español</option>
      </select>
    </div>

    <h1 data-i18n="heading">Pay Now vs Pay Later</h1>
    <p data-i18n="subtitle">
      Compare paying in full today vs a Nelnet-style installment plan.
    </p>

    <form id="compare-form">
      <label>
        <span data-i18n="principal">Principal ($)</span>
        <input
          type="text"
          name="principal"
          value="34,940"
          inputmode="decimal"
          required
        />
      </label>

      <label>
        <span data-i18n="scholarship">Scholarship (%)</span>
        <span class="hint" data-i18n="scholarshipHint"
          >Percentage of principal deducted before calculations</span
        >
        <input
          type="number"
          name="scholarship_pct"
          value="0"
          min="0"
          max="100"
          step="0.01"
          required
        />
      </label>

      <label>
        <span data-i18n="payNowDate">Pay-now date</span>
        <input type="date" name="pay_now_date" value="2026-08-01" required />
      </label>

      <hr class="section-divider" />

      <label>
        <span data-i18n="installmentCount">Number of installments</span>
        <input
          type="number"
          name="installment_count"
          value=""
          min="1"
          max="36"
          step="1"
          placeholder="4"
          required
        />
      </label>

      <fieldset id="installment-fieldset" class="installment-fieldset hidden">
        <legend data-i18n="installmentDatesLegend">Installment dates</legend>
        <p class="hint" data-i18n="installmentDatesHint">
          First defaults to pay-now date; others are monthly. Amounts are principal only — plan interest is added to each payment.
        </p>
        <div id="installment-dates" class="installment-dates"></div>
      </fieldset>

      <hr class="section-divider" />

      <label>
        <span data-i18n="discountRate">Discount rate (%)</span>
        <span class="hint" data-i18n="discountRateHint"
          >Your opportunity-cost / risk-free rate</span
        >
        <input
          type="number"
          name="discount_rate_pct"
          value="3.75"
          min="0"
          step="0.01"
          required
        />
      </label>

      <label>
        <span data-i18n="planInterestRate">Plan interest rate (%)</span>
        <span class="hint" data-i18n="planInterestRateHint"
          >Pay-later plan rate</span
        >
        <input
          type="number"
          name="annual_interest_rate_pct"
          value="0"
          min="0"
          step="0.01"
          required
        />
      </label>

      <label>
        <span data-i18n="setupFee">Setup fee ($)</span>
        <input type="number" name="setup_fee" value="40" min="0" step="0.01" />
      </label>

      <label>
        <span data-i18n="setupFeeDate">Setup fee date</span>
        <span class="hint" data-i18n="setupFeeDateHint"
          >Leave blank to use pay-now date</span
        >
        <input type="date" name="setup_fee_date" />
      </label>

      <button type="submit" data-i18n="compareButton">Compare</button>
    </form>

    <div id="results"></div>

    <script type="module">
      import { compareFromForm } from "./js/payment-comparison.js";
      import {
        applyPageLanguage,
        getLang,
        setLang,
        t,
        translateError,
      } from "./js/i18n.js";

      const form = document.getElementById("compare-form");
      const results = document.getElementById("results");
      const languageSelect = document.getElementById("language-select");
      let currentLang = getLang();
      /** @type {object | null} */
      let lastResult = null;

      languageSelect.value = currentLang;
      applyPageLanguage(currentLang);

      languageSelect.addEventListener("change", () => {
        currentLang = languageSelect.value;
        setLang(currentLang);
        applyPageLanguage(currentLang);
        updateInstallmentLabels();
        if (lastResult) {
          renderResult(lastResult);
        }
      });

      function parseCurrency(value) {
        return Number(String(value).replace(/,/g, ""));
      }

      function formatCurrency(value) {
        const num = Number(value);
        if (Number.isNaN(num)) return value;
        return num.toLocaleString("en-US", { maximumFractionDigits: 2 });
      }

      const installmentDatesEl = document.getElementById("installment-dates");
      const installmentFieldset = document.getElementById("installment-fieldset");

      function getInstallmentCount() {
        const count = Number(form.installment_count.value);
        return Number.isFinite(count) && count >= 1 ? Math.floor(count) : 0;
      }

      function setInstallmentSectionVisible(visible) {
        installmentFieldset.classList.toggle("hidden", !visible);
      }

      function getEffectivePrincipal() {
        const principal = parseCurrency(form.principal.value);
        const scholarshipPct = Number(form.scholarship_pct.value) || 0;
        return principal * (1 - scholarshipPct / 100);
      }

      function evenSplitAmounts(count, total) {
        if (count <= 0) return [];
        const per = Math.round((total / count) * 100) / 100;
        const amounts = Array.from({ length: count }, () => per);
        amounts[count - 1] =
          Math.round((total - per * (count - 1)) * 100) / 100;
        return amounts;
      }

      function addMonths(isoDate, months) {
        const [year, month, day] = isoDate.split("-").map(Number);
        return new Date(Date.UTC(year, month - 1 + months, day))
          .toISOString()
          .slice(0, 10);
      }

      function createInstallmentRow(index, dateValue, amountValue) {
        const row = document.createElement("div");
        row.className = "installment-row";

        const title = document.createElement("div");
        title.className = "installment-row-title";
        title.textContent = t(currentLang, "installment", { n: index + 1 });

        const fields = document.createElement("div");
        fields.className = "installment-row-fields";

        const dateLabel = document.createElement("label");
        dateLabel.className = "installment-field-label";
        dateLabel.htmlFor = `payment_date_${index}`;
        dateLabel.textContent = t(currentLang, "installmentDate");

        const amountLabel = document.createElement("label");
        amountLabel.className = "installment-field-label";
        amountLabel.htmlFor = `payment_amount_${index}`;
        amountLabel.textContent = t(currentLang, "installmentAmount");

        const dateInput = document.createElement("input");
        dateInput.type = "date";
        dateInput.id = `payment_date_${index}`;
        dateInput.name = `payment_date_${index}`;
        dateInput.value = dateValue;
        dateInput.required = true;

        const amountInput = document.createElement("input");
        amountInput.type = "text";
        amountInput.id = `payment_amount_${index}`;
        amountInput.name = `payment_amount_${index}`;
        amountInput.inputMode = "decimal";
        amountInput.value = formatCurrency(amountValue);
        amountInput.required = true;

        fields.append(dateLabel, amountLabel, dateInput, amountInput);
        row.append(title, fields);
        return row;
      }

      function updateInstallmentLabels() {
        const rows = installmentDatesEl.querySelectorAll(".installment-row");
        rows.forEach((row, index) => {
          const title = row.querySelector(".installment-row-title");
          const labels = row.querySelectorAll(".installment-field-label");
          title.textContent = t(currentLang, "installment", { n: index + 1 });
          if (labels[0]) {
            labels[0].textContent = t(currentLang, "installmentDate");
          }
          if (labels[1]) {
            labels[1].textContent = t(currentLang, "installmentAmount");
          }
        });
      }

      function buildInstallmentDates() {
        const count = getInstallmentCount();
        if (!count) {
          installmentDatesEl.replaceChildren();
          setInstallmentSectionVisible(false);
          return;
        }

        setInstallmentSectionVisible(true);
        const startDate = form.pay_now_date.value;
        const amounts = evenSplitAmounts(count, getEffectivePrincipal());

        installmentDatesEl.replaceChildren();
        for (let i = 0; i < count; i++) {
          installmentDatesEl.appendChild(
            createInstallmentRow(i, addMonths(startDate, i), amounts[i])
          );
        }
      }

      function getPaymentDates() {
        return [...installmentDatesEl.querySelectorAll('input[type="date"]')]
          .map((input) => input.value)
          .filter(Boolean);
      }

      function getInstallmentAmounts() {
        return [...installmentDatesEl.querySelectorAll('input[name^="payment_amount_"]')]
          .map((input) => parseCurrency(input.value))
          .filter((value) => !Number.isNaN(value));
      }

      function syncInstallmentDates() {
        const count = getInstallmentCount();
        if (!count) {
          return;
        }

        const payNowDate = form.pay_now_date.value;
        const dateInputs = installmentDatesEl.querySelectorAll('input[type="date"]');

        if (dateInputs.length !== count) {
          buildInstallmentDates();
          return;
        }

        if (dateInputs[0]) {
          dateInputs[0].value = payNowDate;
        }

        for (let i = 1; i < count; i++) {
          if (dateInputs[i]) {
            dateInputs[i].value = addMonths(payNowDate, i);
          }
        }
      }

      function redistributeDefaultAmounts() {
        const count = getInstallmentCount();
        if (!count) {
          return;
        }

        const amounts = evenSplitAmounts(count, getEffectivePrincipal());
        const amountInputs = installmentDatesEl.querySelectorAll(
          'input[name^="payment_amount_"]'
        );
        amountInputs.forEach((input, index) => {
          if (amounts[index] !== undefined) {
            input.value = formatCurrency(amounts[index]);
          }
        });
      }

      form.installment_count.addEventListener("input", buildInstallmentDates);
      form.installment_count.addEventListener("change", buildInstallmentDates);
      form.pay_now_date.addEventListener("input", syncInstallmentDates);
      form.pay_now_date.addEventListener("change", syncInstallmentDates);
      form.scholarship_pct.addEventListener("input", redistributeDefaultAmounts);
      form.principal.addEventListener("blur", () => {
        const amount = parseCurrency(form.principal.value);
        if (!Number.isNaN(amount)) {
          form.principal.value = formatCurrency(amount);
          redistributeDefaultAmounts();
        }
      });
      buildInstallmentDates();

      function formatMoney(amount) {
        return amount.toLocaleString("en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
      }

      function formatBetterOption(option) {
        if (option === "pay_now") return t(currentLang, "resultPayNowBetter");
        if (option === "pay_later") {
          return t(currentLang, "resultPayLaterBetter");
        }
        return t(currentLang, "resultEqual");
      }

      function renderResult(data) {
        const scheduleRows = data.pay_later_schedule
          .map(
            (row) =>
              `<tr><td>${row.date}</td><td>$${formatMoney(row.amount)}</td></tr>`
          )
          .join("");

        const payLaterDelta = data.gain_if_pay_later;
        const payLaterLabel =
          payLaterDelta < 0
            ? t(currentLang, "lossIfPayLater")
            : t(currentLang, "gainIfPayLater");
        const payLaterAmount = formatMoney(Math.abs(payLaterDelta));
        const resultText = t(currentLang, "resultHeader", {
          option: formatBetterOption(data.better_option),
        });

        results.innerHTML = `
          <h2>${resultText}</h2>
          <p><strong>${t(currentLang, "principalResult")}</strong> $${formatMoney(data.principal)}</p>
          <p><strong>${t(currentLang, "scholarshipResult", { pct: data.scholarship_pct })}</strong> −$${formatMoney(data.scholarship_amount)}</p>
          <p><strong>${t(currentLang, "amountCompared")}</strong> $${formatMoney(data.effective_principal)}</p>
          <p><strong>${t(currentLang, "pvPayNow")}</strong> $${formatMoney(data.pv_pay_now)}</p>
          <p><strong>${t(currentLang, "pvPayLater")}</strong> $${formatMoney(data.pv_pay_later)}</p>
          <p><strong>${payLaterLabel}</strong> $${payLaterAmount}</p>
          <p><strong>${t(currentLang, "totalInterestAccrued")}</strong> $${formatMoney(data.total_interest_accrued)}</p>
          <h3>${t(currentLang, "payLaterSchedule")}</h3>
          <table>
            <thead><tr><th>${t(currentLang, "tableDate")}</th><th>${t(currentLang, "tableAmount")}</th></tr></thead>
            <tbody>${scheduleRows}</tbody>
          </table>
        `;
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const payload = {
          principal: parseCurrency(form.principal.value),
          scholarship_pct: Number(form.scholarship_pct.value),
          pay_now_date: form.pay_now_date.value,
          payment_dates: getPaymentDates(),
          installment_amounts: getInstallmentAmounts(),
          discount_rate: Number(form.discount_rate_pct.value) / 100,
          annual_interest_rate:
            Number(form.annual_interest_rate_pct.value) / 100,
          setup_fee: Number(form.setup_fee.value || 0),
        };

        if (form.setup_fee_date.value) {
          payload.setup_fee_date = form.setup_fee_date.value;
        }

        try {
          lastResult = compareFromForm(payload);
          renderResult(lastResult);
        } catch (error) {
          lastResult = null;
          const message =
            error instanceof Error
              ? translateError(currentLang, error.message)
              : String(error);
          results.innerHTML = `<p class="error">${message}</p>`;
        }
      });
    </script>
  </body>
</html>
